<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Crachás - Seletor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 700px;
            gap: 15px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #4A90E2; color: white; }
        .btn-print { background: #27ae60; color: white; }

        .container {
            width: 21cm;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background: white;
        }

        .cracha {
            width: 10.5cm;
            height: 14.85cm;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            border: 0.1mm solid #ccc;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Classes para trocar o fundo via JS */
        .fundo-eucaristia { 
            background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/CrachaRetiroEucaristia/main/Retiro%201%C2%AA%20Eucaristia.png'); 
        }
        .fundo-crisma { 
            /* Substitua pela URL correta da imagem da Crisma se for diferente desta */
            background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/CrachaRetiroCrisma/main/Retiro%20Crisma.png'); 
        }

        .nome {
            font-size: 40px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            color: #000;
            width: 80%;
            word-wrap: break-word;
            line-height: 1.1;
            z-index: 10;
            text-shadow: 0px 0px 10px rgba(255,255,255,0.8);
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; padding: 0; }
            .controls { display: none; }
            .container { width: 21cm; height: 29.7cm; }
            .cracha { border: 0.1mm solid #ddd; page-break-inside: avoid; }
            .cracha:nth-child(4n+5) { page-break-before: always; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label><b>1. Escolha o tipo de retiro:</b></label>
        <select id="seletorFundo">
            <option value="fundo-eucaristia">Retiro 1ª Eucaristia</option>
            <option value="fundo-crisma">Retiro da Crisma</option>
        </select>

        <label><b>2. Cole os nomes completos:</b></label>
        <textarea id="inputRaw" rows="3"></textarea>
        <button class="btn btn-primary" onclick="processarEValidar()">Processar Nomes</button>
        
        <label><b>3. Nomes processados:</b></label>
        <textarea id="inputFinal" rows="3"></textarea>

        <div class="btn-group">
            <button class="btn btn-print" onclick="gerarCrachas()">Gerar Visualização</button>
            <button class="btn btn-primary" style="background:#555" onclick="window.print()">Imprimir</button>
        </div>
    </div>

    <div class="container" id="container"></div>

    <script>
        const PREPOSICOES = ['de', 'do', 'da', 'dos', 'das'];

        function determineProcessedName(name, allNames) {
            const parts = name.split(' ').filter(p => p.length > 0);
            const firstName = parts[0];
            const firstNameCount = allNames.filter(n => n.split(' ')[0].toUpperCase() === firstName.toUpperCase()).length;
            if (firstNameCount === 1 || parts.length === 1) return firstName;
            let currentParts = [firstName], i = 1;
            while (i < parts.length) {
                let next = parts[i];
                currentParts.push(next); i++;
                if (PREPOSICOES.includes(next.toLowerCase()) && i < parts.length) {
                    currentParts.push(parts[i]); i++;
                }
                const segment = currentParts.join(' ');
                let isUnique = true;
                for (const other of allNames) {
                    if (other.toUpperCase() === name.toUpperCase()) continue;
                    if (other.toUpperCase().startsWith(segment.toUpperCase())) { isUnique = false; break; }
                }
                if (isUnique) return segment;
            }
            return name;
        }

        function processarEValidar() {
            const raw = document.getElementById('inputRaw').value;
            const listaOriginal = raw.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const processados = listaOriginal.map(n => determineProcessedName(n, listaOriginal));
            document.getElementById('inputFinal').value = processados.join(', ');
        }

        function gerarCrachas() {
            const finalInput = document.getElementById('inputFinal').value;
            const fundoSelecionado = document.getElementById('seletorFundo').value;
            const nomes = finalInput.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const container = document.getElementById('container');
            
            container.innerHTML = '';
            nomes.forEach(nome => {
                const card = document.createElement('div');
                card.className = `cracha ${fundoSelecionado}`;
                card.innerHTML = `<div class="nome">${nome}</div>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
